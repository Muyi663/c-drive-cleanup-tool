name: Build And Release

"on":
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the v prefix
        required: true
        default: "1.0.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PowerShell Gallery
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted

      - name: Install PS2EXE
        shell: pwsh
        run: |
          Install-Module -Name ps2exe -Scope CurrentUser -Force

      - name: Build executable
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "${{ github.ref_name }}"
          }
          if ($version.StartsWith('v')) {
            $version = $version.Substring(1)
          }

          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Invoke-ps2exe `
            -inputFile ".\Clean-CDrive.ps1" `
            -outputFile ".\dist\CDriveCleanupTool.exe" `
            -title "C Drive Cleanup Tool" `
            -product "C Drive Cleanup Tool" `
            -company "Muyi663" `
            -version $version `
            -noConsole

          Copy-Item ".\README.md" ".\dist\README.zh-CN.md" -Force

          Compress-Archive `
            -Path ".\dist\CDriveCleanupTool.exe", ".\dist\README.zh-CN.md" `
            -DestinationPath ".\dist\CDriveCleanupTool-v$version.zip" `
            -Force

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version && format('v{0}', github.event.inputs.version) || github.ref_name }}
          name: ${{ github.event.inputs.version && format('v{0}', github.event.inputs.version) || github.ref_name }}
          overwrite_files: true
          body: |
            Automated cloud build release.

            Included assets:
            - CDriveCleanupTool.exe
            - CDriveCleanupTool-v*.zip
          files: |
            dist/CDriveCleanupTool.exe
            dist/CDriveCleanupTool-v*.zip
